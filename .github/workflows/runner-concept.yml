name: Runner Context Demo

on:
  workflow_dispatch:

jobs:
  demo:

    runs-on: ubuntu-latest

    steps:

      - name: Print Runner Details
        run: |
          echo "OS: ${{ runner.os }}"
          echo "Architecture: ${{ runner.arch }}"
          echo "Runner Name: ${{ runner.name }}"
          echo "Temp Folder: ${{ runner.temp }}"
          echo "Tool Cache: ${{ runner.tool_cache }}"