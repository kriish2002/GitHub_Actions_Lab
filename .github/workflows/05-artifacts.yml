name: Artifact Demo

on:
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:


      - name: Checkout
        uses: actions/checkout@v3


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-files
          path: index.html

  test:
   runs-on: ubuntu-latest
   needs: build

   steps:
    - name: Notify
      run: |
        echo "## Test Passed ✅" >> $GITHUB_STEP_SUMMARY
        echo "index.html validation successful" >> $GITHUB_STEP_SUMMARY      


  deploy:
    runs-on: ubuntu-latest

    
    needs: build

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: website-files

      - name: Show File
        run: cat index.html