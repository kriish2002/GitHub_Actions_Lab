name: Artifact Demo

on:
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-files
          path: index.html

  deploy:
    runs-on: ubuntu-latest

    needs: build

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: website-files

      - name: Show File
        run: cat index.html