name: Environment Variables Demo

on:
  workflow_dispatch:

# Workflow Level Environment Variable
env:
  APP_NAME: Krishna-App
  VERSION: v2.0

jobs:
  demo:
    runs-on: ubuntu-latest

    # Job Level Environment Variable
    env:
      ENVIRONMENT: Development

    steps:
      - name: Print Workflow Variables
        run: |
          echo "Application: $APP_NAME"
          echo "Version: $VERSION"

      - name: Print Job Variable
        run: |
          echo "Environment: $ENVIRONMENT"

      - name: Override Environment Variable
        env:
          ENVIRONMENT: Production

        run: |
          echo "Environment: $ENVIRONMENT"

      - name: Check Job Variable Again
        run: |
          echo "Environment: $ENVIRONMENT"